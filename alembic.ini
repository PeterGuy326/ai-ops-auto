# alembic configuration — ai-ops-auto
#
# 与默认 alembic 模板差异：
#  - script_location = alembic（项目根，非 src/）
#  - sqlalchemy.url = sqlite:///./data/ai_ops.db （仅 fallback；env.py 优先读 DATABASE_URL / settings.database_url）
#  - 日志走 stdlib 默认，project 自己的 observability 不在 migration 路径下接管
#
# 使用：
#   alembic upgrade head         # 升到最新
#   alembic downgrade base       # 全部回滚
#   alembic revision --autogenerate -m "msg"  # 基于 models.py 变更生成新迁移
#   DATABASE_URL=sqlite:///tmp/x.db alembic upgrade head  # 用临时 DB

[alembic]
script_location = alembic

# fallback URL — env.py 里 DATABASE_URL env / settings.database_url 都为空时才用此值
sqlalchemy.url = sqlite:///./data/ai_ops.db

# 时区配置（默认 UTC，与 _now() 一致）
# timezone =

# 不截断 migration message 文件名
truncate_slug_length = 60

# 不分版本目录
# version_locations = %(here)s/alembic/versions

# 路径分隔符（POSIX）
version_path_separator = os

[post_write_hooks]
# 暂不挂 black / ruff format；migration 文件量小，手动维护即可

# -------------------- 日志 --------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
